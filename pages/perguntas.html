<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/img/varinha-icon.png" type="image/x-icon">
    <title>Hogwarts Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/styles-perguntas/style.css">
</head>

<body>
  
  <div class="quiz-card">
    <button id="ButtonReiniciar">Voltar ao Inicio</button>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <h1 id="perguntaNumero"></h1>

    <div class="container_imagem_pergunta">

      <div class="container_imagem">
        <img class="img_chapeu fechada" src="../img/Chapéu_seletor_boca_fechada.png" alt="Chapéu-Hogwarts">
        <img class="img_chapeu aberta" src="../img/Chapéu_seletor_boca_aberta.png" alt="Chapéu-Hogwarts">
      </div>
      
      <div class="pergunta_balão">
        <p class="pergunta_fala" id="pergunta"></p>
      </div>

    </div>

    <div class="opcoes">

      <input class="resposta" type="radio" name="q1" id="r1">
      <label for="r1">Resposta 1</label>

      <input class="resposta" type="radio" name="q1" id="r2">
      <label for="r2">Resposta 2</label>

      <input class="resposta" type="radio" name="q1" id="r3">
      <label for="r3">Resposta 3</label>

    </div>

    <button id="avancar">Avançar</button>
    
  </div>

  <script type="module" src="../js/script.js"></script>

</body>
</html>
